<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our online courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<main class="catalog">

  <div class="catalog__decor-dots" aria-hidden="true"></div>
  <div class="catalog__decor-halfcircles" aria-hidden="true">
    <span class="catalog__decor-halfcircle"></span>
    <span class="catalog__decor-halfcircle"></span>
    <span class="catalog__decor-halfcircle"></span>
  </div>
  <div class="catalog__decor-stairs" aria-hidden="true">
    <span class="catalog__decor-stair"></span>
    <span class="catalog__decor-stair"></span>
    <span class="catalog__decor-stair"></span>
    <span class="catalog__decor-stair"></span>
  </div>

  <header class="catalog__header">
    <span class="catalog__eyebrow">ENJOY YOUR STUDYING!</span>
    <h1 class="catalog__title">Our online courses</h1>
  </header>

  <div class="catalog__controls">

    <nav class="filter" aria-label="Filter by category">
      <ul class="filter__tabs" id="filter-tabs" role="list"></ul>
    </nav>

    <div class="search">
      <input
        class="search__input"
        id="search-input"
        type="search"
        placeholder="Search course..."
        aria-label="Search course"
      >
      <button class="search__btn" type="button" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="m12.5 12.5 3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

  </div>

  <div class="catalog__grid" id="catalog-grid" role="list"></div>

  <footer class="catalog__footer">
    <button class="load-more" id="load-more-btn" type="button">
      <svg class="load-more__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M1 10C1 5.03 5.03 1 10 1c3.26 0 6.12 1.67 7.8 4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17.8 5.2V1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M17.8 5.2h-3.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M19 10c0 4.97-4.03 9-9 9-3.26 0-6.12-1.67-7.8-4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2.2 14.8v3.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2.2 14.8h3.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Load more
    </button>
  </footer>

</main>

<script src="js/main.js"></script>
</body>
</html>
